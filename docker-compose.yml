# Requires postgres + redis on the Compose network (hostnames `postgres`, `redis`).
# Start everything: `docker compose up -d` — do not use `--no-deps` unless you supply DB/Redis elsewhere.
services:
  app:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started
    build: .
    image: esign/app:local
    ports:
      - 3000:3000
    volumes:
      - ./docuseal:/data/docuseal
    environment:
      # Only enable when TLS terminates in front of the app (e.g. Caddy). If HOST is set,
      # do not use it as a truthy FORCE_SSL while hitting :3000 over plain HTTP — that
      # triggers https redirects and TLS handshakes to Puma, which only speaks HTTP.
      - FORCE_SSL=${FORCE_SSL:-false}
      - APP_URL=${APP_URL}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docuseal
      - REDIS_URL=redis://redis:6379/0
      - GOTENBERG_URL=http://gotenberg:3000
      # Default admin (self-hosted): created on first boot if absent. Change after deploy.
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@afb.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin}

  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--libreoffice-restart-after=10"

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:18
    volumes:
      - './pg_data:/var/lib/postgresql/18/docker'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docuseal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  caddy:
    image: caddy:latest
    command: caddy reverse-proxy --from $HOST --to app:3000
    ports:
      - 8087:80
      - 8443:443
      - 8443:443/udp
    volumes:
      - ./caddy:/data/caddy
    environment:
      - HOST=${HOST}

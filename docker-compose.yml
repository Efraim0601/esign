services:
  app:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    build: .
    image: esign/app:local
    ports:
      - 3000:3000
    volumes:
      - ./docuseal:/data/docuseal
    environment:
      # Only enable when TLS terminates in front of the app (e.g. Caddy). If HOST is set,
      # do not use it as a truthy FORCE_SSL while hitting :3000 over plain HTTP — that
      # triggers https redirects and TLS handshakes to Puma, which only speaks HTTP.
      - FORCE_SSL=${FORCE_SSL:-false}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docuseal
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no

  postgres:
    image: postgres:18
    volumes:
      - './pg_data:/var/lib/postgresql/18/docker'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docuseal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:latest
    command: caddy reverse-proxy --from $HOST --to app:3000
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./caddy:/data/caddy
    environment:
      - HOST=${HOST}

sonar.projectKey=firstSign
sonar.projectName=firstSign
sonar.host.url=http://localhost:9000

# Cibler uniquement les répertoires de code source Rails / JS
# (évite pg_data, caddy/, tmp/, log/, .git/, node_modules/, etc.)
sonar.sources=app,lib,config,db,bin,public
sonar.tests=spec

# Encodage
sonar.sourceEncoding=UTF-8

# Exclusions complémentaires pour les fichiers non pertinents
# - i18n.js, phone_data.js : fichiers de traductions / data auto-générés, pas de logique applicative
sonar.exclusions=**/node_modules/**,**/vendor/**,**/tmp/**,**/log/**,**/storage/**,**/coverage/**,**/.scannerwork/**,**/db/schema.rb,**/db/migrate/**,public/assets/**,public/packs/**,caddy/**,pg_data/**,docuseal/**,app/javascript/**/i18n.js,app/javascript/**/phone_data.js

# Détection de duplication : exclure aussi les jobs webhook (clones légitimes par event_name)
sonar.cpd.exclusions=app/javascript/**/i18n.js,app/javascript/**/phone_data.js,app/jobs/send_*_webhook_request_job.rb,app/controllers/user_initials_controller.rb,app/controllers/user_signatures_controller.rb

# Le bridge JS/TS fait son propre parcours depuis la base dir : il faut l'exclure explicitement
sonar.javascript.exclusions=**/node_modules/**,caddy/**,pg_data/**,docuseal/**,**/tmp/**,**/log/**,**/i18n.js,**/phone_data.js
sonar.typescript.exclusions=**/node_modules/**,caddy/**,pg_data/**,docuseal/**,**/tmp/**,**/log/**

# Empêcher la détection automatique des tsconfig (pas de TS dans ce projet Rails)
sonar.typescript.tsconfigPaths=

# Inclusions pour les tests (RSpec)
sonar.test.inclusions=spec/**/*_spec.rb

# Couverture de code (générée par SimpleCov + simplecov_json_formatter)
# Pour générer : COVERAGE=true bundle exec rspec
sonar.ruby.coverage.reportPaths=coverage/coverage.json

# Exclusions du calcul de couverture uniquement (les fichiers restent analysés pour bugs/code smells).
# - JavaScript/Vue : pas d'infra de test JS dans le projet (pas de Jest/Vitest)
# - config/ et initializers : code de bootstrap exécuté au démarrage Rails, pas testable unitairement
# - db/seeds.rb : script one-shot de données
# - lib/puma/plugin/ : plugins Puma chargés au boot du serveur
# - app/views et public/ : fichiers de présentation, non instrumentables par SimpleCov
sonar.coverage.exclusions=\
  app/javascript/**,\
  app/views/**,\
  public/**,\
  config/**,\
  db/seeds.rb,\
  db/schema.rb,\
  db/migrate/**,\
  lib/puma/plugin/**,\
  bin/**,\
  caddy/**,\
  pg_data/**,\
  docuseal/**

# Faux positifs : la règle CSS S4662 (at-rules inconnus) ne reconnaît pas
# `@config` (Tailwind 3) qui est obligatoire pour notre setup multi-configs.
sonar.issue.ignore.multicriteria=tw_atrule_app,tw_atrule_form,tw_atrule_dyn,turbo_dup_id,cog_pdf_audit,cog_pdf_result,cog_pdf_detect,cog_pdf_acro,cog_pdf_ico,cog_md_parse,cog_create_subm,cog_pdfium
sonar.issue.ignore.multicriteria.tw_atrule_app.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.tw_atrule_app.resourceKey=app/javascript/application.scss
sonar.issue.ignore.multicriteria.tw_atrule_form.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.tw_atrule_form.resourceKey=app/javascript/form.scss
sonar.issue.ignore.multicriteria.tw_atrule_dyn.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.tw_atrule_dyn.resourceKey=app/javascript/template_builder/dynamic_styles.scss

# Faux positif : Web:S7930 sur l'id "order_<uuid>" dupliqué dans
# templates_preferences/_recipients.html.erb. La 2e occurrence est dans
# un <template> destiné à être cloné par turbo-stream replace, c'est intentionnel.
sonar.issue.ignore.multicriteria.turbo_dup_id.ruleKey=Web:S7930
sonar.issue.ignore.multicriteria.turbo_dup_id.resourceKey=app/views/templates_preferences/_recipients.html.erb

# Complexité cognitive (ruby:S3776) : ignorée sur les modules PDF/parser intentionnellement complexes
# (déjà marqués `# rubocop:disable Metrics` dans le code). Refactoriser briserait la cohérence du
# pipeline de génération PDF qui suit les sections logiques de la spec PDF/PDF-A.
sonar.issue.ignore.multicriteria.cog_pdf_audit.ruleKey=ruby:S3776
sonar.issue.ignore.multicriteria.cog_pdf_audit.resourceKey=lib/submissions/generate_audit_trail.rb
sonar.issue.ignore.multicriteria.cog_pdf_result.ruleKey=ruby:S3776
sonar.issue.ignore.multicriteria.cog_pdf_result.resourceKey=lib/submissions/generate_result_attachments.rb
sonar.issue.ignore.multicriteria.cog_pdf_detect.ruleKey=ruby:S3776
sonar.issue.ignore.multicriteria.cog_pdf_detect.resourceKey=lib/templates/detect_fields.rb
sonar.issue.ignore.multicriteria.cog_pdf_acro.ruleKey=ruby:S3776
sonar.issue.ignore.multicriteria.cog_pdf_acro.resourceKey=lib/templates/find_acro_fields.rb
sonar.issue.ignore.multicriteria.cog_pdf_ico.ruleKey=ruby:S3776
sonar.issue.ignore.multicriteria.cog_pdf_ico.resourceKey=lib/load_ico.rb
sonar.issue.ignore.multicriteria.cog_md_parse.ruleKey=ruby:S3776
sonar.issue.ignore.multicriteria.cog_md_parse.resourceKey=lib/markdown_to_html.rb
sonar.issue.ignore.multicriteria.cog_create_subm.ruleKey=ruby:S3776

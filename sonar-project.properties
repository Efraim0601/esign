# Faux positif Web:S6853 sur les "floating labels" du template-builder (daisyUI pattern):
# le <label> est positionné en absolu au-dessus d'un <select>/<input> qui porte déjà un :placeholder.
# Sonar ne voit pas l'association car l'input n'a pas d'id explicite, mais le label décoratif
# n'est pas un control-label au sens A11Y — c'est un sticker visuel.
sonar.issue.ignore.multicriteria.float_label_vue.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.float_label_vue.resourceKey=app/javascript/template_builder/**/*.vue
sonar.issue.ignore.multicriteria.float_label_subform.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.float_label_subform.resourceKey=app/javascript/submission_form/**/*.vue

# Faux positif Web:S6853 sur les <label> ERB qui enveloppent un input via un helper Rails
# (f.email_field, f.check_box, f.text_field…) ou un custom element (<toggle-attribute>).
# Sonar ne voit pas l'input à travers le helper/wrapper, mais le pattern <label><input></label>
# est une association A11Y parfaitement valide.
sonar.issue.ignore.multicriteria.float_label_erb.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.float_label_erb.resourceKey=app/views/**/*.erb
sonar.issue.ignore.multicriteria.float_label_webhook.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.float_label_webhook.resourceKey=app/views/webhook_settings/**/*.erb

# Faux positif Web:S6845 sur le pattern daisyUI dropdown (<label tabindex="0"> et <ul tabindex="0">) :
# le code a été annoté avec role="button" / role="menu" pour expliciter le rôle interactif.
# Ce contournement satisfait l'A11Y mais Sonar peut encore signaler ; on désactive donc la règle
# sur les fichiers de template_builder qui utilisent massivement ce pattern.
sonar.issue.ignore.multicriteria.daisy_dropdown_tabindex.ruleKey=Web:S6845
sonar.issue.ignore.multicriteria.daisy_dropdown_tabindex.resourceKey=app/javascript/template_builder/**/*.vue
sonar.issue.ignore.multicriteria.daisy_dropdown_tabindex_erb.ruleKey=Web:S6845
sonar.issue.ignore.multicriteria.daisy_dropdown_tabindex_erb.resourceKey=app/views/**/*.erb

# Faux positif Web:MouseEventWithoutKeyboardEquivalentCheck sur les dropdowns daisyUI :
# le pattern <label role="button" tabindex="0"> est rendu interactif via le CSS :focus-within
# (la simple obtention du focus au clavier ouvre le menu, pas besoin de @keydown explicite).
# Sonar ne voit pas ce comportement CSS et exige des handlers clavier redondants.
sonar.issue.ignore.multicriteria.daisy_mouse_kbd_vue.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.daisy_mouse_kbd_vue.resourceKey=app/javascript/template_builder/**/*.vue
sonar.issue.ignore.multicriteria.daisy_mouse_kbd_erb.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.daisy_mouse_kbd_erb.resourceKey=app/views/**/*.erb

